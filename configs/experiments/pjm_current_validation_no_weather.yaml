project:
  name: "pjm_current_validation_no_weather"
  random_seeds: [7]
  benchmark_seed: 7
  directories:
    raw_data_dir: "../data/raw"
    processed_data_dir: "../data/processed_current"
    artifact_dir: "../artifacts_ablation/no_weather"
    hyperparameter_dir: "../artifacts_current/hyperparameters"
    prediction_dir: "../artifacts_ablation/no_weather/predictions"
    metrics_dir: "../artifacts_ablation/no_weather/metrics"
    plots_dir: "../artifacts_ablation/no_weather/plots"
    report_dir: "../artifacts_ablation/no_weather/report"

dataset:
  source_type: "official_weather_ready"
  dataset_name: "PJM"
  unique_id: "PJM_COMED"
  source_url: "https://zenodo.org/records/4624805/files/PJM.csv"
  local_csv_path: "../data/raw/PJM_COMED_20210101_20260331_weather_ready.csv"
  source_filename: "PJM.csv"
  start_date: "2021-01-01"
  end_date: "2026-03-31"
  timestamp_col: "Date"
  price_col: "Zonal COMED price"
  exogenous_columns:
    system_load_forecast: "System load forecast"
    zonal_load_forecast: "Zonal COMED load foecast"

features:
  target_col: "y"
  future_exog:
    - "zonal_load_forecast"
  price_lags: [24, 168]
  lag_sources:
    - "zonal_load_forecast"
  source_lags: [24, 168]
  cyclical:
    hour: 24
    day_of_week: 7
    day_of_year: 366
    month: 12
  holiday_country: "US"
  scaler:
    enabled: true
    strategy_candidates: ["none", "standard", "robust"]

weather:
  enabled: false

backtest:
  horizon: 24
  freq: "h"
  years_test: 1
  validation_days: 182
  rolling_window_days: 728
  retrain_weekday: 0
  retrain_weekday_name: "MON"
  seasonal_naive_lag_hours: 168
  benchmark_models: ["nbeatsx"]

tuning:
  model_name: "nbeatsx"
  n_trials: 5
  metric: "mae"
  use_ensemble_in_tuning: false
  search_space:
    input_size: [168, 336, 504, 672]
    learning_rate: [0.00005, 0.008]
    batch_size: [16, 32, 64]
    max_steps: [250, 900]
    dropout: [0.0, 0.3]
    mlp_units:
      - [256, 256]
      - [512, 512]
      - [768, 768]

models:
  nbeatsx:
    type: "nbeatsx"
    h: 24
    input_size: 336
    max_steps: 600
    learning_rate: 0.0005
    batch_size: 16
    dropout_prob_theta: 0.05
    scaler_type: "identity"
    target_transform: "asinh_q95"
    exog_scaler: "zscore"
    early_stop_patience_steps: 10
    val_check_steps: 50
    validation_size: 168
    windows_batch_size: 512
    ensemble_aggregation: "mean"
    ensemble_members: []
    stack_types: ["trend", "seasonality", "identity"]
    mlp_units:
      - [768, 768]
      - [768, 768]
      - [768, 768]

report:
  primary_metric: "mae"
  auxiliary_metrics: ["rmse", "smape", "hourly_mae", "dm"]
  include_high_volatility_week: true

retrieval:
  enabled: false
