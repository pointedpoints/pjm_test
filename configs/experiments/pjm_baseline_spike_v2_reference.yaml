project:
  name: pjm_baseline_spike_v2_reference
  benchmark_seed: 7
  directories:
    raw_data_dir: ../data/raw
    processed_data_dir: ../data/processed_current_spike_v2_reference
    artifact_dir: ../artifacts_baseline_spike_v2_reference
    hyperparameter_dir: ../artifacts_baseline_spike_v2_reference/hyperparameters
    prediction_dir: ../artifacts_baseline_spike_v2_reference/predictions
    metrics_dir: ../artifacts_baseline_spike_v2_reference/metrics
    plots_dir: ../artifacts_baseline_spike_v2_reference/plots
    report_dir: ../artifacts_baseline_spike_v2_reference/report
  random_seeds:
  - 7
report:
  auxiliary_metrics:
  - mae
  - rmse
  - smape
  - hourly_mae
  - dm
  include_high_volatility_week: true
  primary_metric: pinball
  quantile_postprocess:
    enabled: false
  scenario_evaluation:
    copula_family: student_t
    dof_grid:
    - 3.0
    - 5.0
    - 7.0
    - 10.0
    enabled: true
    n_samples: 256
    random_seed: 7
    source_split: validation
    tail_policy: linear
retrieval:
  enabled: false
tuning:
  metric: pinball
  model_name: nhits_336
  n_trials: 5
  search_space:
    batch_size:
    - 16
    - 32
    - 64
    dropout:
    - 0.0
    - 0.3
    input_size:
    - 168
    - 336
    - 504
    - 672
    learning_rate:
    - 5.0e-05
    - 0.008
    max_steps:
    - 250
    - 900
    mlp_units:
    - - 256
      - 256
    - - 512
      - 512
    - - 768
      - 768
  use_ensemble_in_tuning: false
weather:
  cache_dir: ../data/raw/weather
  enabled: true
  model: best_match
  output_columns:
  - weather_temp_mean
  - weather_temp_spread
  - weather_apparent_temp_mean
  - weather_wind_speed_mean
  - weather_cloud_cover_mean
  - weather_precip_area_fraction
  points:
  - latitude: 41.885
    longitude: -87.62
    name: chicago_lakefront
    weight: 0.24
  - latitude: 41.978
    longitude: -87.904
    name: ohare_northwest
    weight: 0.18
  - latitude: 42.148
    longitude: -87.8
    name: north_suburbs
    weight: 0.14
  - latitude: 41.836
    longitude: -88.243
    name: west_suburbs
    weight: 0.18
  - latitude: 41.605
    longitude: -87.793
    name: southwest_suburbs
    weight: 0.14
  - latitude: 41.525
    longitude: -87.635
    name: south_suburbs
    weight: 0.12
  precipitation_area_fraction_threshold_mm: 0.1
  provider: open_meteo_historical_forecast
  timezone: America/Chicago
